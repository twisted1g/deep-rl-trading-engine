exchange:
  testnet: true
  symbol: BTCUSDT
  interval: 1h
  leverage: 1
  margin_type: ISOLATED

model:
  experiment_dir: ../DeepRLTradingResearch/experiments/a2c-baseline/20260517-153458-f0cb0e
  algo: a2c
  state_space: baseline

  lstm_checkpoint_path: ../DeepRLTradingResearch/src/encoders/lstm_encoder.pt
  lstm_device: cpu

env:
  feature_window: 20
  lstm_window_size: 128
  lstm_hidden_size: 64
  lstm_layers: 2

trading:
  equity_fraction: 1.0
  max_holding_time: 72
  max_drawdown_threshold: 0.08
  poll_seconds: 30
  bar_close_grace_seconds: 5
